<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>User - Kas Kelas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }
        .app-container { max-width: 1200px; margin: 0 auto; }
        .glass-header {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: slideDown 0.6s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-header .user-info { display: flex; align-items: center; gap: 16px; }
        .glass-header .user-info span {
            background: rgba(255,255,255,0.08);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-logout {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.4); transform: scale(1.05); }
        .nav-sidebar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .nav-tab {
            flex: 1 0 auto;
            padding: 10px 12px;
            text-align: center;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.8rem;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-tab i { display: block; font-size: 1.2rem; margin-bottom: 2px; }
        .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-tab.active {
            background: rgba(96,165,250,0.25);
            color: #93c5fd;
            box-shadow: 0 4px 16px rgba(96,165,250,0.15);
        }
        .page { display: none; animation: fadeUp 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 14px;
            color: #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
        }
        .stat-box {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
            transition: 0.3s;
        }
        .stat-box:hover { background: rgba(255,255,255,0.08); transform: scale(1.02); }
        .stat-box .num {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-box .label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #e2e8f0;
            font-size: 0.95rem;
            transition: 0.3s;
            outline: none;
        }
        .form-control:focus {
            border-color: rgba(96,165,250,0.4);
            box-shadow: 0 0 0 4px rgba(96,165,250,0.1);
        }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            text-align: left;
            padding: 12px 8px;
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #e2e8f0; }
        .badge {
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
        }
        .badge-success { background: rgba(52,211,153,0.2); color: #34d399; }
        .badge-danger { background: rgba(248,113,113,0.2); color: #f87171; }
        .text-muted { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
        .mt-2 { margin-top: 12px; }
        .chart-container { height: 280px; width: 100%; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 999;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            opacity: 0;
            transition: 0.5s;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .glass-header h1 { font-size: 1.2rem; }
            .nav-tab { font-size: 0.65rem; padding: 8px 4px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-box .num { font-size: 1.3rem; }
            .glass-card { padding: 14px; }
            table { font-size: 0.75rem; }
            th, td { padding: 8px 4px; }
            .chart-container { height: 200px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div id="toast" class="toast"></div>

    <header class="glass-header">
        <h1>💰 Kas Kelas</h1>
        <div class="user-info">
            <span>👤 User</span>
            <a href="/logout" class="btn-logout">Keluar</a>
        </div>
    </header>

    <nav class="nav-sidebar">
        <button class="nav-tab active" data-page="dashboard">📊 Dashboard</button>
        <button class="nav-tab" data-page="anggota">👥 Anggota</button>
        <button class="nav-tab" data-page="status">📊 Status</button>
        <button class="nav-tab" data-page="riwayat">📜 Riwayat</button>
    </nav>

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
        <div class="glass-card">
            <div class="stats-grid" id="dashboardStats">
                <div class="stat-box"><div class="num" id="statSaldo">0</div><div class="label">Saldo</div></div>
                <div class="stat-box"><div class="num" id="statIn">0</div><div class="label">Total Masuk</div></div>
                <div class="stat-box"><div class="num" id="statOut">0</div><div class="label">Total Keluar</div></div>
                <div class="stat-box"><div class="num" id="statAnggota">0</div><div class="label">Anggota</div></div>
            </div>
        </div>
        <div class="glass-card">
            <div class="card-title">📈 Grafik 6 Bulan Terakhir</div>
            <div class="chart-container"><canvas id="chartKas"></canvas></div>
        </div>
    </div>

    <!-- ANGGOTA -->
    <div id="page-anggota" class="page">
        <div class="glass-card">
            <div class="card-title">📋 Daftar Anggota</div>
            <div class="table-wrap">
                <table><thead><tr><th>ID</th><th>Nama</th><th>Kelas</th></tr></thead>
                <tbody id="tableAnggota"></tbody></table>
            </div>
            <p class="text-muted mt-2">*Hanya melihat</p>
        </div>
    </div>

    <!-- STATUS -->
    <div id="page-status" class="page">
        <div class="glass-card">
            <div class="card-title"><span>📊 Status Iuran</span><input type="month" id="statusBulan" class="form-control" style="width:auto;padding:6px 12px;" onchange="loadStatus()"></div>
            <div class="table-wrap">
                <table><thead><tr><th>Nama</th><th>Total Bayar</th><th>Target</th><th>Status</th></tr></thead>
                <tbody id="tableStatus"></tbody></table>
            </div>
            <p id="statusSummary" class="text-muted mt-2"></p>
        </div>
    </div>

    <!-- RIWAYAT -->
    <div id="page-riwayat" class="page">
        <div class="glass-card">
            <div class="card-title"><span>📜 Riwayat</span><input type="month" id="riwayatBulan" class="form-control" style="width:auto;padding:6px 12px;" onchange="loadRiwayat()"></div>
            <div class="table-wrap">
                <table><thead><tr><th>Tgl</th><th>Anggota</th><th>Jenis</th><th>Kategori</th><th>Nominal</th></tr></thead>
                <tbody id="tableRiwayat"></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  USER SCRIPT
// ============================================================
const API = {
    dashboard: '/api/dashboard',
    anggota: '/api/anggota',
    transaksi: '/api/transaksi',
    status: '/api/status',
    chart: '/api/chart_data'
};
let chartInstance = null;

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => el.classList.remove('show'), 4000);
}

function formatRupiah(num) {
    return new Intl.NumberFormat('id-ID').format(num);
}
function getThisMonth() { return new Date().toISOString().slice(0, 7); }

document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const page = this.dataset.page;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        if (page === 'dashboard') { loadDashboard(); loadChart(); }
        if (page === 'anggota') loadAnggota();
        if (page === 'status') loadStatus();
        if (page === 'riwayat') loadRiwayat();
    });
});

async function loadDashboard() {
    try {
        const res = await fetch(API.dashboard);
        const data = await res.json();
        document.getElementById('statSaldo').textContent = formatRupiah(data.saldo);
        document.getElementById('statIn').textContent = formatRupiah(data.total_in);
        document.getElementById('statOut').textContent = formatRupiah(data.total_out);
        document.getElementById('statAnggota').textContent = data.total_anggota;
    } catch(e) { console.error(e); }
}

async function loadChart() {
    try {
        const res = await fetch(API.chart);
        const data = await res.json();
        const ctx = document.getElementById('chartKas').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.labels,
                datasets: [
                    { label: 'Pemasukan', data: data.pemasukan, backgroundColor: 'rgba(52,211,153,0.6)', borderColor: '#34d399', borderWidth: 2 },
                    { label: 'Pengeluaran', data: data.pengeluaran, backgroundColor: 'rgba(248,113,113,0.6)', borderColor: '#f87171', borderWidth: 2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#94a3b8', callback: v => 'Rp ' + formatRupiah(v) } },
                    x: { ticks: { color: '#94a3b8' } }
                }
            }
        });
    } catch(e) { console.error(e); }
}

async function loadAnggota() {
    try {
        const res = await fetch(API.anggota);
        const data = await res.json();
        const tbody = document.getElementById('tableAnggota');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-muted">Belum ada anggota</td></tr>'; return; }
        tbody.innerHTML = data.map(a => `<tr><td>${a.id}</td><td><strong>${a.nama}</strong></td><td>${a.kelas||'-'}</td></tr>`).join('');
    } catch(e) { toast('Gagal load anggota'); }
}

async function loadStatus() {
    const bulan = document.getElementById('statusBulan').value || getThisMonth();
    try {
        const res = await fetch(`${API.status}?bulan=${bulan}`);
        const data = await res.json();
        const tbody = document.getElementById('tableStatus');
        if (!data.data.length) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-muted">Tidak ada anggota</td></tr>';
            document.getElementById('statusSummary').textContent = '';
            return;
        }
        let sudah=0, belum=0;
        tbody.innerHTML = data.data.map(d => {
            if (d.status === 'Lunas') sudah++; else belum++;
            return `<tr><td><strong>${d.nama}</strong></td><td>Rp ${formatRupiah(d.total_bayar)}</td>
                    <td>Rp ${formatRupiah(d.target)}</td>
                    <td><span class="badge ${d.status==='Lunas'?'badge-success':'badge-danger'}">${d.status}</span></td></tr>`;
        }).join('');
        document.getElementById('statusSummary').textContent = `✅ ${sudah} Lunas | ❌ ${belum} Belum (Target: Rp ${formatRupiah(data.target_iuran)})`;
    } catch(e) { toast('Gagal load status'); }
}

async function loadRiwayat() {
    const bulan = document.getElementById('riwayatBulan').value || getThisMonth();
    try {
        const res = await fetch(`${API.transaksi}?bulan=${bulan}`);
        const data = await res.json();
        const tbody = document.getElementById('tableRiwayat');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-muted">Tidak ada transaksi</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(t => `
            <tr><td>${t.tanggal}</td><td>${t.nama_anggota||'Umum'}</td>
            <td><span class="badge ${t.jenis==='pemasukan'?'badge-success':'badge-danger'}">${t.jenis}</span></td>
            <td>${t.kategori||'-'}</td><td>Rp ${formatRupiah(t.nominal)}</td></tr>
        `).join('');
    } catch(e) { toast('Gagal load riwayat'); }
}

document.addEventListener('DOMContentLoaded', function() {
    const thisMonth = getThisMonth();
    document.getElementById('statusBulan').value = thisMonth;
    document.getElementById('riwayatBulan').value = thisMonth;
    loadDashboard(); loadChart(); loadAnggota(); loadStatus(); loadRiwayat();
});
</script>
</body>
</html>
