<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kas Kelas</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            padding: 20px;
        }
        @keyframes gradientBG {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            animation: fadeUp 0.8s ease;
            transition: transform 0.3s;
        }
        .login-card:hover { transform: translateY(-4px); }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }
        .login-card h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .login-card .sub {
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 28px;
            font-weight: 300;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #a78bfa;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 4px rgba(167,139,250,0.2);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(124,58,237,0.3);
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 10px 28px rgba(124,58,237,0.5); }
        .error {
            background: rgba(239,68,68,0.2);
            border-left: 4px solid #ef4444;
            padding: 12px 16px;
            border-radius: 12px;
            color: #fca5a5;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        .info {
            margin-top: 24px;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 18px;
        }
        .info strong { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>💰 Kas Kelas</h1>
        <div class="sub">Masuk untuk mengelola</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin atau user" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">🔓 Masuk</button>
        </form>
        <div class="info">
            <strong></strong> &nbsp;|&nbsp; <strong>User:</strong> user / kelas123
        </div>
    </div>
</body>
</html>
