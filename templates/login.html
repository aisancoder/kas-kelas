<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kas Kelas</title>
    <!-- Google Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            background-image: radial-gradient(circle at 20% 50%, rgba(120, 80, 255, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 50%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
            padding: 20px;
        }
        .login-wrapper {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 50px 80px -30px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: 0.3s;
        }
        .login-left {
            flex: 1;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-left h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .login-left h1 span { background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-left p.sub {
            color: rgba(255,255,255,0.4);
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            font-size: 0.8rem;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #a78bfa;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.2); }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(79, 70, 229, 0.5); }
        .btn-user {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }
        .btn-user:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.2); }
        .error {
            background: rgba(239,68,68,0.12);
            border-left: 4px solid #ef4444;
            padding: 12px 16px;
            border-radius: 12px;
            color: #fca5a5;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        .login-right {
            flex: 0 0 40%;
            background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(79,70,229,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-left: 1px solid rgba(255,255,255,0.04);
        }
        .login-right .badge {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            text-align: center;
        }
        .login-right .badge strong { color: rgba(255,255,255,0.5); display: block; font-size: 1.2rem; margin-bottom: 4px; }
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; border-radius: 32px; }
            .login-right { display: none; }
            .login-left { padding: 32px 24px; }
            .login-left h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-left">
            <h1>💰 Kas <span>Kelas</span></h1>
            <p class="sub">Masuk untuk mengelola keuangan kelas</p>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST" id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" id="username" placeholder="admin / user" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">🔓 Masuk</button>
                <button type="button" class="btn-user" onclick="loginAs('user','kelas123')">👤 Login sebagai User (Otomatis)</button>
            </form>
            <div style="margin-top: 24px; text-align: center; color: rgba(255,255,255,0.15); font-size: 0.7rem;">
                &copy; 2026 Kelas 9.1 All rights reserved.
            </div>
        </div>
        <div class="login-right">
            <div class="badge">
                <strong>📋 35 Siswa</strong>
                <span>Ready to manage</span>
            </div>
        </div>
    </div>
    <script>
        function loginAs(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('loginForm').submit();
        }
    </script>
</body>
</html>
